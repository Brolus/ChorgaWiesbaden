    <h1>Chorga</h1>
    <p>Chorga ist eine Chor-App für Liedverwaltung, Proben, Gottesdienste, Termine, Rückmeldungen und Organisation im Gemeinde- und Choralltag.</p>
    <p>Die Plattform unterstützt Chöre und Gemeinden dabei, Liedgut, Chormappen, Probenstand, Termine und Zuständigkeiten an einem gemeinsamen Ort zu verwalten.</p>
    <ul>
      <li>Liedverwaltung mit Chormappen, Tags und Probenstand</li>
      <li>Termine für Probe, Gottesdienst und weitere Einsätze</li>
      <li>Rückmeldungen und Teilnahme direkt in der App</li>
      <li>Rollen und Zuständigkeiten für Chorleitung, Dirigat und Mitglieder</li>
    </ul>
